# LoRA training configuration — paper defaults
# Used by:  python train_lora_adapters.py --config configs/lora_default.yaml

# ── Base model ────────────────────────────────────────────────────────────────
model_id:   "runwayml/stable-diffusion-v1-5"
dtype:       "float16"          # float16 (GPU) | float32 (CPU)

# ── LoRA hyper-parameters ─────────────────────────────────────────────────────
rank:   16                      # ablation values: 4, 8, 16, 32, 64
alpha:  1.0                     # LoRA alpha;  scaling = alpha / rank
target_modules:
  - "to_q"
  - "to_k"
  - "to_v"
  - "to_out.0"
dropout: 0.0

# ── Optimisation ──────────────────────────────────────────────────────────────
num_epochs:   100               # paper uses 200; 100 is fast and sufficient
learning_rate: 1.0e-4
weight_decay:  0.01
batch_size:    1
gradient_clip: 1.0

# ── Data ──────────────────────────────────────────────────────────────────────
resolution:   512
use_center_crop: true
random_flip:     false          # privacy: no augmentation on victim images

# ── Logging / checkpointing ───────────────────────────────────────────────────
save_every_n_epochs: 50
log_every_n_steps:   10

# ── Device ───────────────────────────────────────────────────────────────────
device: "cuda"                  # override with --device cpu

# ── Output ───────────────────────────────────────────────────────────────────
output_dir: "./adapters"
